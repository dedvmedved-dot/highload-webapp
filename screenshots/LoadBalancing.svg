<title>master_state</title>
<polygon fill="#ef9a9a" stroke="black" points="167.82,-258.4 16.18,-258.4 16.18,-178.4 167.82,-178.4 167.82,-258.4"/>
<text xml:space="preserve" text-anchor="middle" x="92" y="-245.4" font-family="Arial" font-size="10.00">nginx-1 (MASTER)</text>
<text xml:space="preserve" text-anchor="middle" x="92" y="-233.4" font-family="Arial" font-size="10.00">priority=100</text>
<text xml:space="preserve" text-anchor="middle" x="92" y="-221.4" font-family="Arial" font-size="10.00">Владеет VIP 192.168.122.100</text>
<text xml:space="preserve" text-anchor="middle" x="92" y="-209.4" font-family="Arial" font-size="10.00">Шлёт VRRP Advertisement</text>
