<text xml:space="preserve" text-anchor="middle" x="92" y="-185.4" font-family="Arial" font-size="10.00">на multicast 224.0.0.18</text>
</g>
<!-- backup_state -->
<g id="node2" class="node">
<title>backup_state</title>
