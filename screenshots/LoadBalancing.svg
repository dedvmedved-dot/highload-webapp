<text xml:space="preserve" text-anchor="middle" x="153" y="-47" font-family="Arial" font-size="10.00">Слушает VRRP Advertisement</text>
<text xml:space="preserve" text-anchor="middle" x="153" y="-35" font-family="Arial" font-size="10.00">VIP не назначен</text>
<text xml:space="preserve" text-anchor="middle" x="153" y="-23" font-family="Arial" font-size="10.00">Ожидает отказа MASTER</text>
