<path fill="none" stroke="black" d="M272.94,-148.5C272.94,-148.5 272.94,-85.13 272.94,-85.13"/>
<polygon fill="black" stroke="black" points="276.44,-85.13 272.94,-75.13 269.44,-85.13 276.44,-85.13"/>
<text xml:space="preserve" text-anchor="middle" x="288.59" y="-118.2" font-family="Times,serif" font-size="14.00">если запрос</text>
<text xml:space="preserve" text-anchor="middle" x="288.59" y="-101.4" font-family="Times,serif" font-size="14.00">/static/*</text>
</g>
