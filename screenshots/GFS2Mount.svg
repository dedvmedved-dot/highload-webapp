<svg width="281pt" height="753pt" viewBox="0.00 0.00 281.00 753.00" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<g id="graph0" class="graph" transform="scale(1 1) rotate(0) translate(4 748.8)">
<title>GFS2Mount</title>
<polygon fill="white" stroke="none" points="-4,4 -4,-748.8 277.05,-748.8 277.05,4 -4,4"/>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-724.6" font-family="Arial" font-size="18.00">Процесс инициализации GFS2</text>
<!-- start -->
<g id="node1" class="node">
<title>start</title>
<ellipse fill="#e8f0fe" stroke="black" cx="136.53" cy="-697.2" rx="27" ry="18"/>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-694.2" font-family="Arial" font-size="10.00">Старт</text>
</g>
<!-- step1 -->
<g id="node2" class="node">
<title>step1</title>
<polygon fill="#fce8e6" stroke="black" points="220.11,-643.2 52.94,-643.2 52.94,-599.2 220.11,-599.2 220.11,-643.2"/>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-630.2" font-family="Arial" font-size="10.00">1. Установка linux-image-generic</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-618.2" font-family="Arial" font-size="10.00">Облачное ядро не включает</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-606.2" font-family="Arial" font-size="10.00">модуль gfs2</text>
</g>
<!-- start&#45;&gt;step1 -->
<g id="edge1" class="edge">
<title>start-&gt;step1</title>
<path fill="none" stroke="black" d="M136.53,-678.8C136.53,-678.8 136.53,-655 136.53,-655"/>
<polygon fill="black" stroke="black" points="140.03,-655 136.53,-645 133.03,-655 140.03,-655"/>
</g>
<!-- step2 -->
<g id="node3" class="node">
<title>step2</title>
<polygon fill="#fce8e6" stroke="black" points="218.15,-563.2 54.9,-563.2 54.9,-527.2 218.15,-527.2 218.15,-563.2"/>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-548.2" font-family="Arial" font-size="10.00">2. Перезагрузка с новым ядром</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-536.2" font-family="Arial" font-size="10.00">uname -r: 5.15.0-181-generic</text>
</g>
<!-- step1&#45;&gt;step2 -->
<g id="edge2" class="edge">
<title>step1-&gt;step2</title>
<path fill="none" stroke="black" d="M136.53,-598.8C136.53,-598.8 136.53,-575.11 136.53,-575.11"/>
<polygon fill="black" stroke="black" points="140.03,-575.11 136.53,-565.11 133.03,-575.11 140.03,-575.11"/>
</g>
<!-- step3 -->
<g id="node4" class="node">
<title>step3</title>
<polygon fill="#fce8e6" stroke="black" points="193.15,-491.2 79.9,-491.2 79.9,-447.2 193.15,-447.2 193.15,-491.2"/>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-478.2" font-family="Arial" font-size="10.00">3. Загрузка модулей</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-466.2" font-family="Arial" font-size="10.00">modprobe dlm</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-454.2" font-family="Arial" font-size="10.00">modprobe gfs2</text>
</g>
<!-- step2&#45;&gt;step3 -->
<g id="edge3" class="edge">
<title>step2-&gt;step3</title>
<path fill="none" stroke="black" d="M136.53,-526.8C136.53,-526.8 136.53,-503 136.53,-503"/>
<polygon fill="black" stroke="black" points="140.03,-503 136.53,-493 133.03,-503 140.03,-503"/>
</g>
<!-- step4 -->
<g id="node5" class="node">
<title>step4</title>
<polygon fill="#fff3e0" stroke="black" points="185.92,-411.2 87.13,-411.2 87.13,-367.2 185.92,-367.2 185.92,-411.2"/>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-398.2" font-family="Arial" font-size="10.00">4. Запуск DLM</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-386.2" font-family="Arial" font-size="10.00">systemctl start dlm</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-374.2" font-family="Arial" font-size="10.00">dlm_controld 4.1.1</text>
</g>
<!-- step3&#45;&gt;step4 -->
<g id="edge4" class="edge">
<title>step3-&gt;step4</title>
<path fill="none" stroke="black" d="M136.53,-446.91C136.53,-446.91 136.53,-423.15 136.53,-423.15"/>
<polygon fill="black" stroke="black" points="140.03,-423.15 136.53,-413.15 133.03,-423.15 140.03,-423.15"/>
</g>
<!-- step5 -->
<g id="node6" class="node">
<title>step5</title>
<polygon fill="#fff3e0" stroke="black" points="194.82,-331.2 78.24,-331.2 78.24,-287.2 194.82,-287.2 194.82,-331.2"/>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-318.2" font-family="Arial" font-size="10.00">5. Подключение iSCSI</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-306.2" font-family="Arial" font-size="10.00">iscsiadm --login</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-294.2" font-family="Arial" font-size="10.00">Появляется /dev/sda</text>
</g>
<!-- step4&#45;&gt;step5 -->
<g id="edge5" class="edge">
<title>step4-&gt;step5</title>
<path fill="none" stroke="black" d="M136.53,-366.91C136.53,-366.91 136.53,-343.15 136.53,-343.15"/>
<polygon fill="black" stroke="black" points="140.03,-343.15 136.53,-333.15 133.03,-343.15 140.03,-343.15"/>
</g>
<!-- step6 -->
<g id="node7" class="node">
<title>step6</title>
<polygon fill="#e6f4ea" stroke="black" points="204.81,-251.2 68.24,-251.2 68.24,-195.2 204.81,-195.2 204.81,-251.2"/>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-238.2" font-family="Arial" font-size="10.00">6. Создание ФС (один раз)</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-226.2" font-family="Arial" font-size="10.00">mkfs.gfs2 -p lock_dlm</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-214.2" font-family="Arial" font-size="10.00">-t gfs2-cluster:gfs2</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-202.2" font-family="Arial" font-size="10.00">-j 2 /dev/sda</text>
</g>
<!-- step5&#45;&gt;step6 -->
<g id="edge6" class="edge">
<title>step5-&gt;step6</title>
<path fill="none" stroke="black" d="M136.53,-287.05C136.53,-287.05 136.53,-262.96 136.53,-262.96"/>
<polygon fill="black" stroke="black" points="140.03,-262.96 136.53,-252.96 133.03,-262.96 140.03,-262.96"/>
</g>
<!-- step7 -->
<g id="node8" class="node">
<title>step7</title>
<polygon fill="#e6f4ea" stroke="black" points="223.87,-159.2 49.19,-159.2 49.19,-115.2 223.87,-115.2 223.87,-159.2"/>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-146.2" font-family="Arial" font-size="10.00">7. Монтирование на ОБОИХ узлах</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-134.2" font-family="Arial" font-size="10.00">mount -t gfs2 -o lockproto=lock_dlm</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-122.2" font-family="Arial" font-size="10.00">/dev/sda /mnt/gfs2_static</text>
</g>
<!-- step6&#45;&gt;step7 -->
<g id="edge7" class="edge">
<title>step6-&gt;step7</title>
<path fill="none" stroke="black" d="M136.53,-195.04C136.53,-195.04 136.53,-170.93 136.53,-170.93"/>
<polygon fill="black" stroke="black" points="140.03,-170.93 136.53,-160.93 133.03,-170.93 140.03,-170.93"/>
</g>
<!-- step8 -->
<g id="node9" class="node">
<title>step8</title>
<ellipse fill="#c8e6c9" stroke="black" cx="136.53" cy="-39.6" rx="84" ry="39.6"/>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-54.6" font-family="Arial" font-size="10.00">8. Готово! Оба узла</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-42.6" font-family="Arial" font-size="10.00">видят одну ФС</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-30.6" font-family="Arial" font-size="10.00">Запись на одном узле</text>
<text xml:space="preserve" text-anchor="middle" x="136.53" y="-18.6" font-family="Arial" font-size="10.00">видна на другом</text>
</g>
<!-- step7&#45;&gt;step8 -->
<g id="edge8" class="edge">
<title>step7-&gt;step8</title>
<path fill="none" stroke="black" d="M136.53,-115.05C136.53,-115.05 136.53,-91.2 136.53,-91.2"/>
<polygon fill="black" stroke="black" points="140.03,-91.2 136.53,-81.2 133.03,-91.2 140.03,-91.2"/>
</g>
</g>
</svg>