<polygon fill="#c8e6c9" stroke="black" points="227.99,-570.23 98.07,-570.23 98.07,-514.23 227.99,-514.23 227.99,-570.23"/>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-557.23" font-family="Arial" font-size="10.00">Решение 4:</text>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-545.23" font-family="Arial" font-size="10.00">systemctl mask apparmor</text>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-533.23" font-family="Arial" font-size="10.00">security_driver = none</text>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-521.23" font-family="Arial" font-size="10.00">chown libvirt-qemu:kvm</text>
</g>
