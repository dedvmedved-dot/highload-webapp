<text xml:space="preserve" text-anchor="middle" x="163.03" y="-281.23" font-family="Arial" font-size="10.00">Проблема 6: GFS2</text>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-269.23" font-family="Arial" font-size="10.00">• Нет модуля в облачном ядре</text>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-257.23" font-family="Arial" font-size="10.00">• DLM не запускается</text>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-245.23" font-family="Arial" font-size="10.00">• mkfs.gfs2 зависает</text>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-233.23" font-family="Arial" font-size="10.00">• Разные имена устройств</text>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-221.23" font-family="Arial" font-size="10.00">• Segmentation fault</text>
</g>
<!-- solution5&#45;&gt;problem6 -->
<g id="edge11" class="edge">
