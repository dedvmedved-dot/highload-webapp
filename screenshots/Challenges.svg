<text xml:space="preserve" text-anchor="middle" x="163.03" y="-637.23" font-family="Arial" font-size="10.00">Блокирует QEMU доступ</text>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-625.23" font-family="Arial" font-size="10.00">к /var/lib/libvirt/images</text>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-613.23" font-family="Arial" font-size="10.00">Ошибка: Permission denied</text>
</g>
