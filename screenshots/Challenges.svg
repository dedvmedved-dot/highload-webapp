<text xml:space="preserve" text-anchor="middle" x="163.03" y="-165.23" font-family="Arial" font-size="10.00">Решение 6:</text>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-153.23" font-family="Arial" font-size="10.00">• linux-image-generic</text>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-141.23" font-family="Arial" font-size="10.00">• systemctl start dlm</text>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-129.23" font-family="Arial" font-size="10.00">• Запуск DLM перед mkfs</text>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-117.23" font-family="Arial" font-size="10.00">• /dev/disk/by-path/</text>
<text xml:space="preserve" text-anchor="middle" x="163.03" y="-105.23" font-family="Arial" font-size="10.00">• Перезагрузка и пересоздание</text>
</g>
