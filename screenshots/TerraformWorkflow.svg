<text xml:space="preserve" text-anchor="middle" x="117.52" y="-244.25" font-family="Arial" font-size="10.00">1. libvirt_volume.ubuntu_image</text>
<text xml:space="preserve" text-anchor="middle" x="117.52" y="-232.25" font-family="Arial" font-size="10.00">   Скачивает образ Ubuntu (~500 МБ)</text>
<text xml:space="preserve" text-anchor="middle" x="117.52" y="-208.25" font-family="Arial" font-size="10.00">2. libvirt_volume.disk (×6)</text>
<text xml:space="preserve" text-anchor="middle" x="117.52" y="-196.25" font-family="Arial" font-size="10.00">   Создаёт диски ВМ (10 ГБ каждый)</text>
