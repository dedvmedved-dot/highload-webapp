<text xml:space="preserve" text-anchor="middle" x="117.52" y="-160.25" font-family="Arial" font-size="10.00">   Создаёт ISO с SSH-ключом</text>
<text xml:space="preserve" text-anchor="middle" x="117.52" y="-136.25" font-family="Arial" font-size="10.00">4. libvirt_domain.vm (×6)</text>
<text xml:space="preserve" text-anchor="middle" x="117.52" y="-124.25" font-family="Arial" font-size="10.00">   Запускает виртуальные машины</text>
<text xml:space="preserve" text-anchor="middle" x="117.52" y="-100.25" font-family="Arial" font-size="10.00">5. outputs</text>
<text xml:space="preserve" text-anchor="middle" x="117.52" y="-88.25" font-family="Arial" font-size="10.00">   Выводит IP-адреса</text>
